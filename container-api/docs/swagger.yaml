basePath: /
definitions:
  internal_handler.containerResponse:
    properties:
      id:
        type: string
      image:
        type: string
      is_owner:
        description: |-
          IsOwner tells the frontend whether the caller may mutate this
          container (start/stop/delete/change visibility) — computed here,
          not left for the client to infer, since the client only knows its
          own API key, not the owner ID it resolves to.
        type: boolean
      name:
        type: string
      owner_id:
        type: string
      status:
        type: string
      visibility:
        type: string
    type: object
  internal_handler.createContainerRequest:
    properties:
      cmd:
        items:
          type: string
        type: array
      env:
        items:
          type: string
        type: array
      image:
        type: string
      name:
        type: string
      visibility:
        description: '"private" (default) or "public"'
        type: string
    required:
    - image
    - name
    type: object
  internal_handler.createContainerResponse:
    properties:
      id:
        type: string
      image:
        type: string
      is_owner:
        description: |-
          IsOwner tells the frontend whether the caller may mutate this
          container (start/stop/delete/change visibility) — computed here,
          not left for the client to infer, since the client only knows its
          own API key, not the owner ID it resolves to.
        type: boolean
      job_id:
        type: string
      name:
        type: string
      owner_id:
        type: string
      status:
        type: string
      visibility:
        type: string
    type: object
  internal_handler.jobResponse:
    properties:
      error:
        type: string
      id:
        type: string
      stage:
        description: |-
          Stage is only ever populated for a create job — see domain.Job's
          doc comment.
        type: string
      status:
        type: string
    type: object
  internal_handler.logEntryResponse:
    properties:
      fields:
        additionalProperties: {}
        type: object
      level:
        type: string
      message:
        type: string
      timestamp:
        type: string
    type: object
  internal_handler.setVisibilityRequest:
    properties:
      visibility:
        type: string
    required:
    - visibility
    type: object
  internal_handler.uploadResponse:
    properties:
      content_type:
        type: string
      filename:
        type: string
      id:
        type: string
      is_owner:
        description: IsOwner mirrors containerResponse's — see its comment.
        type: boolean
      owner_id:
        type: string
      size:
        type: integer
      visibility:
        type: string
    type: object
info:
  contact: {}
  description: RESTful API for managing per-user Docker containers, file uploads,
    and async job status.
  title: conTogether Container API
  version: "1.0"
paths:
  /containers:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handler.containerResponse'
            type: array
      security:
      - ApiKeyAuth: []
      summary: List containers the authenticated owner can see (their own, plus everyone's
        public ones)
      tags:
      - containers
    post:
      consumes:
      - application/json
      description: Persists a placeholder container and submits a create job; poll
        GET /jobs/{jobId} for progress and completion.
      parameters:
      - description: Container spec
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.createContainerRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_handler.createContainerResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Create a container (asynchronous)
      tags:
      - containers
  /containers/{id}:
    delete:
      description: Submits a delete job and returns immediately; poll GET /jobs/{jobId}
        for completion.
      parameters:
      - description: Container ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_handler.jobResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete a container (asynchronous)
      tags:
      - containers
    get:
      parameters:
      - description: Container ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.containerResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get a container
      tags:
      - containers
  /containers/{id}/start:
    post:
      description: Submits a start job and returns immediately; poll GET /jobs/{jobId}
        for completion.
      parameters:
      - description: Container ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_handler.jobResponse'
      security:
      - ApiKeyAuth: []
      summary: Start a container (asynchronous)
      tags:
      - containers
  /containers/{id}/stop:
    post:
      description: Submits a stop job and returns immediately; poll GET /jobs/{jobId}
        for completion.
      parameters:
      - description: Container ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_handler.jobResponse'
      security:
      - ApiKeyAuth: []
      summary: Stop a container (asynchronous)
      tags:
      - containers
  /containers/{id}/visibility:
    put:
      consumes:
      - application/json
      parameters:
      - description: Container ID
        in: path
        name: id
        required: true
        type: string
      - description: Desired visibility
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.setVisibilityRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.containerResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Change a container's visibility (owner-only)
      tags:
      - containers
  /jobs/{jobId}:
    get:
      parameters:
      - description: Job ID
        in: path
        name: jobId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.jobResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get job status
      tags:
      - jobs
  /logs:
    delete:
      parameters:
      - description: RFC3339 timestamp; entries strictly before this are removed
        in: query
        name: before
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Delete operational log entries older than a cutoff
      tags:
      - logs
    get:
      description: Returns log entries at or above `level` (default DEBUG = everything),
        optionally filtered by time range and message substring.
      parameters:
      - description: 'Minimum level: DEBUG, INFO, WARN, ERROR'
        in: query
        name: level
        type: string
      - description: RFC3339 timestamp, inclusive lower bound
        in: query
        name: since
        type: string
      - description: RFC3339 timestamp, inclusive upper bound
        in: query
        name: until
        type: string
      - description: Substring match against the log message
        in: query
        name: contains
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handler.logEntryResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Query container-api's own operational logs
      tags:
      - logs
  /uploads:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handler.uploadResponse'
            type: array
      security:
      - ApiKeyAuth: []
      summary: List uploads the authenticated owner can see (their own, plus everyone's
        public ones)
      tags:
      - uploads
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      - description: \
        in: formData
        name: visibility
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handler.uploadResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Upload a data file (CSV/JSON/image/code) to the user's folder
      tags:
      - uploads
  /uploads/{id}:
    get:
      parameters:
      - description: Upload ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            type: file
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Download an upload (owner, or anyone if it's public)
      tags:
      - uploads
  /uploads/{id}/visibility:
    put:
      consumes:
      - application/json
      parameters:
      - description: Upload ID
        in: path
        name: id
        required: true
        type: string
      - description: Desired visibility
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.setVisibilityRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.uploadResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Change an upload's visibility (owner-only)
      tags:
      - uploads
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: X-API-Key
    type: apiKey
swagger: "2.0"
