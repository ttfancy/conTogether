syntax = "proto3";

package logsys.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "contogether/container-api/internal/genproto/logsys/v1;logsysv1";

// LogEntry mirrors logsys.LogEntry — the same data crossing every
// transport (REST, gRPC, WebSocket) is this one shape.
message LogEntry {
  google.protobuf.Timestamp timestamp = 1;
  string level = 2;
  string message = 3;
  google.protobuf.Struct fields = 4;
}

// ReadLogs / ClearLogs mirror the GET/DELETE /logs REST endpoints —
// same underlying logsys.Manager, different wire protocol.
message ReadLogsRequest {
  string level = 1;
  google.protobuf.Timestamp since = 2;
  google.protobuf.Timestamp until = 3;
  string contains = 4;
}

message ReadLogsResponse {
  repeated LogEntry entries = 1;
}

message ClearLogsRequest {
  google.protobuf.Timestamp before = 1;
}

message ClearLogsResponse {}

// StreamContainerLogs mirrors GET /containers/{id}/logs/stream (SSE) —
// same ContainerService.StreamLogs underneath, server-streaming gRPC
// instead of an event stream.
message StreamContainerLogsRequest {
  string container_id = 1;
  string tail = 2;
}

message StreamContainerLogsResponse {
  string line = 1;
}

service LogService {
  rpc ReadLogs(ReadLogsRequest) returns (ReadLogsResponse);
  rpc ClearLogs(ClearLogsRequest) returns (ClearLogsResponse);
  rpc StreamContainerLogs(StreamContainerLogsRequest) returns (stream StreamContainerLogsResponse);
}
